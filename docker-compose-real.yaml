version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mcp_postgres_real
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: meta_mcp
    ports:
      - "5432:5432"
    volumes:
      - pgdata_real:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d meta_mcp"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mcp_redis_real
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:alpine
    container_name: mcp_nats_real
    command: "--jetstream -m 8222"
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "4222"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp_app_real
    stdin_open: true
    tty: true
    ports:
      - "8080:8080"
    environment:
      - CONFIG_PATH=/app/config.yaml
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_NAME=meta_mcp
      - DB_SSLMODE=disable
      - REDIS_ADDR=redis:6379
      - NATS_URL=nats://nats:4222
      - SERVER_HTTP_PORT=8080
      - TIER=pro
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./policies.yaml:/app/policies.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy

volumes:
  pgdata_real:
